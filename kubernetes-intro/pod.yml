apiVersion: v1
kind: Pod
metadata:
  name: homework-pod
  namespace: homework
spec:
  initContainers:
  - name: init-container
    image: busybox:latest
    command: ['sh', '-c', 'echo "<h1>Init container</h1>" > /init/index.html']
    volumeMounts:
    - name: shared-volume
      mountPath: /init
  containers:
    - name: python-web
      image: python:3-alpine
      command: ['sh', '-c', 'python -m http.server 8000']
      workingDir: /homework
      ports:
        - containerPort: 8000
      volumeMounts:
        - name: shared-volume
          mountPath: /homework
      lifecycle:
        preStop:
          exec:
            command: ['rm', '/homework/index.html']
  volumes:
    - name: shared-volume
      emptyDir: {}